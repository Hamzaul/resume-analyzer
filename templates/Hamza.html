<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Builder - SkillSync</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg, #0f0f1f, #1e1e2f, #2c2c54);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #fff;
      overflow-x: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating shapes */
    .floating-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.15;
      animation: float 20s linear infinite;
      z-index: 0;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); }
      50% { transform: translateY(50vh) rotate(180deg); opacity: 0.3; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Container for main content */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-grow: 1;
      justify-content: center;
      padding: 50px 20px;
    }

    /* Resume Card */
    .resume-card {
      background: rgba(255, 255, 255, 0.05);
      padding: 50px 50px;
      border-radius: 25px;
      width: 600px;
      max-width: 95%;
      box-shadow: 0 0 50px rgba(0, 191, 255, 0.3);
      backdrop-filter: blur(15px);
      text-align: center;
      transition: transform 0.3s ease;
    }

    .resume-card:hover { transform: translateY(-5px); }

    h2 {
      color: #00bfff;
      font-size: 2.2rem;
      margin-bottom: 30px;
      text-shadow: 0 0 15px rgba(0, 191, 255, 0.6);
    }

    input, textarea {
      width: 100%;
      padding: 14px 15px;
      margin: 12px 0;
      border: none;
      border-radius: 12px;
      outline: none;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1rem;
      box-shadow: 0 0 12px rgba(0, 191, 255, 0.1);
      transition: 0.3s;
    }

    input:focus, textarea:focus {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 25px rgba(0, 191, 255, 0.4);
    }

    textarea { resize: none; height: 100px; }

    button {
      background: linear-gradient(90deg, #00bfff, #0080ff, #00bfff);
      border: none;
      padding: 14px 30px;
      border-radius: 15px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1.05rem;
      color: #1e1e2f;
      margin-top: 20px;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(0, 191, 255, 0.5);
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0, 191, 255, 0.8);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 15px;
      font-size: 0.9rem;
      color: #bbb;
      border-top: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.2);
    }

    @media (max-width: 650px) {
      .resume-card { width: 95%; padding: 30px 25px; }
      h2 { font-size: 1.8rem; }
    }

  </style>
</head>
<body>

  <!-- Floating shapes -->
  <div class="floating-shape" style="width:120px;height:120px;top:10%;left:15%;background:#00bfff;"></div>
  <div class="floating-shape" style="width:90px;height:90px;top:80%;left:5%;background:#0080ff;"></div>
  <div class="floating-shape" style="width:150px;height:150px;top:40%;left:70%;background:#00ffff;"></div>
  <div class="floating-shape" style="width:70px;height:70px;top:60%;left:50%;background:#00bfff;"></div>

  <div class="container">
    <div class="resume-card">
      <h2>Build Your Resume</h2>
      <form action="{{ url_for('generate_resume') }}" method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="phone" placeholder="Phone Number" required>
        <input type="text" name="education" placeholder="Education" required>
        <textarea name="skills" placeholder="Skills (comma separated)" required></textarea>
        <textarea name="experience" placeholder="Experience (optional)"></textarea>
        <textarea name="projects" placeholder="Projects (comma separated)" required></textarea>
        <button type="submit">Download Resume PDF</button>
      </form>
    </div>
  </div>

  <footer>
    &copy; 2025 SUDARSHAN. All Rights Reserved.
  </footer>

</body>
</html>
